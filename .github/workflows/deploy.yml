name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/new-app-discussion-00eihk]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout old game (main)
      - uses: actions/checkout@v4
        with:
          ref: main
          path: old-game

      # Checkout new game (ladrao branch)
      - uses: actions/checkout@v4
        with:
          ref: claude/new-app-discussion-00eihk
          path: new-game

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build 0a7 Legends (agora servido em /0a7/, domínio próprio na raiz)
      - name: Build 0a7 Legends
        working-directory: old-game
        run: |
          npm ci
          DEPLOY_BASE=/0a7/ npm run build
          mv dist ../legends-dist
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.LENDASSECRET }}

      # Build O Ladrão de Lendas em /ladrao/
      - name: Build O Ladrão de Lendas
        working-directory: new-game
        run: |
          npm ci
          DEPLOY_BASE=/ladrao/ npm run build

      # Build Leilão Legends 38 na RAIZ (leilaolegends.com abre direto no jogo)
      - name: Build Leilão Legends 38 (raiz)
        working-directory: old-game
        run: |
          DEPLOY_BASE=/ VITE_ONLY_GAME=escalacao npm run build
          mv dist ../leilao-root-dist

      # Build Leilão também em /leilao-legends-38/ (mantém o link antigo funcionando)
      - name: Build Leilão Legends 38 (compat /leilao-legends-38/)
        working-directory: old-game
        run: |
          DEPLOY_BASE=/leilao-legends-38/ VITE_ONLY_GAME=escalacao npm run build
          mv dist ../leilao-sub-dist

      # Combine: Leilão na raiz · 0a7 em /0a7/ · ladrão em /ladrao/ · leilão compat em /leilao-legends-38/
      - name: Combine builds
        run: |
          mkdir -p final-dist/0a7 final-dist/ladrao final-dist/leilao-legends-38
          cp -r leilao-root-dist/. final-dist/
          cp -r legends-dist/. final-dist/0a7/
          cp -r new-game/dist/. final-dist/ladrao/
          cp -r leilao-sub-dist/. final-dist/leilao-legends-38/
          echo "leilaolegends.com" > final-dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: final-dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deploy
